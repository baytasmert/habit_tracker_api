name: CI/CD Pipeline

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: pip install -r requirements.txt
      
      - name: Lint with flake8
        run: flake8 src/ --max-line-length=120
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
          POSTGRES_DB: habits
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      localstack:  
        image: localstack/localstack:latest
        env:
          SERVICES: s3
          DEBUG: 1
          DATA_DIR: /tmp/localstack
          DOCKER_HOST: unix:///var/run/docker.sock
        ports:
          - 4566:4566
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: pip install -r requirements.txt
      
      - name: Run tests with coverage
        run: pytest tests/ -v --cov=src --cov-fail-under=70 --cov-report=xml
        env:
          DATABASE_URL: postgresql://user:password@localhost:5432/habits
          DB_HOST: localhost

      - name: Upload coverage report
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
  build:
    runs-on: ubuntu-latest
    needs: [lint, test]
    permissions:
      contents: read
      packages: write
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-and-test:
    runs-on: ubuntu-latest
    needs: build
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
          POSTGRES_DB: habits
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      localstack:
        image: localstack/localstack:latest
        env:
          SERVICES: s3
          DEBUG: 1
          DATA_DIR: /tmp/localstack
          DOCKER_HOST: unix:///var/run/docker.sock
        ports:
          - 4566:4566
    steps:
      - uses: actions/checkout@v4

      - name: Set up Kind
        run: |
          curl -Lo ./kind https://kind.sigs.k8s.io/dl/v0.20.0/kind-linux-amd64
          chmod +x ./kind
          sudo mv ./kind /usr/local/bin/kind
          kind create cluster --name=habit-tracker
     
          
      - name: Update deployment image
        run: |
          sed -i 's|image: .*|image: '"${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"'|' k8s/deployment.yaml
    
      - name: Set up kubectl
        uses: azure/setup-kubectl@v3

      - name: Pull Docker image from registry
        run: |
          docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Load Docker image into Kind
        run: |
          kind load docker-image ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} --name=habit-tracker

      - name: Deploy to Kind cluster
        run: |
          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/service.yaml
          kubectl apply -f k8s/configmap.yaml
          kubectl rollout status deployment/habit-tracker-api -n default --timeout=5m

      - name: Wait for pod readiness
        run: |
          kubectl wait --for=condition=ready pod -l app=habit-tracker-api -n default --timeout=5m

      - name: Port forward
        run: |
          kubectl port-forward svc/habit-tracker-api-service 8001:8001 -n default &
          sleep 5

      - name: Smoke test - Health endpoint
        run: |
          curl -f http://localhost:8001/health || exit 1
          curl -s http://localhost:8001/health | grep -q 'ok' || exit 1

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Newman
        run: npm install -g newman

      - name: Run Newman tests
        run: |
          newman run ./postman/HabitTrackerAPI.postman_collection.json \
            --environment ./postman/environment.json \
            --variable base_url=http://localhost:8001 \
            --reporters cli,json \
            --reporter-json-export ./postman-results.json || exit 1

      - name: Upload Newman results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: newman-results
          path: postman-results.json

      - name: Debug - Show pod logs on failure
        if: failure()
        run: |
          kubectl logs -l app=habit-tracker-api -n default --all-containers=true || true
          kubectl describe pods -n default || true
