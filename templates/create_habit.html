{% extends "base.html" %}

{% block title %}Create Habit - Habit Tracker{% endblock %}

{% block content %}
<div class="form-container">
    <div class="form-card">
        <h1>Create New Habit</h1>
        <form id="createHabitForm">
            <div class="form-group">
                <label for="name">Habit Name:</label>
                <input type="text" id="name" name="name" required>
            </div>

            <div class="form-group">
                <label for="description">Description:</label>
                <textarea id="description" name="description" rows="4"></textarea>
            </div>

            <div class="form-group">
                <label for="goal_days_per_week">Goal (days per week):</label>
                <select id="goal_days_per_week" name="goal_days_per_week" required>
                    <option value="">Select...</option>
                    <option value="1">1 day</option>
                    <option value="2">2 days</option>
                    <option value="3">3 days</option>
                    <option value="4">4 days</option>
                    <option value="5">5 days</option>
                    <option value="6">6 days</option>
                    <option value="7">7 days</option>
                </select>
            </div>

            <div class="form-group">
                <label for="image">Habit Photo (Optional):</label>
                <input type="file" id="image" name="image" accept="image/*">
                <small>Upload a photo for your habit (optional)</small>
            </div>

            <button type="submit" class="btn btn-primary">Create Habit</button>
            <a href="/dashboard" class="btn btn-secondary">Cancel</a>
        </form>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
document.getElementById('createHabitForm').addEventListener('submit', async (e) => {
    e.preventDefault();

    if (!token) {
        window.location.href = '/login';
        return;
    }

    const name = document.getElementById('name').value;
    const description = document.getElementById('description').value;
    const goal_days_per_week = parseInt(document.getElementById('goal_days_per_week').value);
    const imageFile = document.getElementById('image').files[0];

    try {
        const response = await fetch('/habits', {
            method: 'POST',
            headers: {
                'Authorization': `Bearer ${token}`,
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                name,
                description,
                goal_days_per_week
            })
        });

        if (!response.ok) {
            alert('Failed to create habit');
            return;
        }

        const habit = await response.json();

        if (imageFile) {
            const formData = new FormData();
            formData.append('file', imageFile);

            const imageResponse = await fetch(`/habits/${habit.id}/image`, {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${token}`
                },
                body: formData
            });

            if (!imageResponse.ok) {
                console.error('Image upload failed');
            }
        }

        window.location.href = '/my-habits';
    } catch (error) {
        alert('Error: ' + error.message);
    }
});
</script>
{% endblock %}
