# ═══════════════════════════════════════════════════════════════════
# Kubernetes ConfigMap — Environment Variables
# ═══════════════════════════════════════════════════════════════════
# Pod'lara ortam değişkenleri geçir (DATABASE_URL, AWS_ENDPOINT_URL vb.)
# Kapanış: kubectl delete configmap habit-tracker-config

apiVersion: v1
kind: ConfigMap
metadata:
  name: habit-tracker-config
  namespace: default
data:
  # 🗄️ Database Konfigürasyonu
  DATABASE_URL: "postgresql://user:password@postgres-service:5432/habits"
  DB_HOST: "postgres-service"
  AWS_ENDPOINT_URL: "http://host.docker.internal:4566"
  AWS_REGION: "us-east-1"
  AWS_ACCESS_KEY_ID: "test"
  AWS_SECRET_ACCESS_KEY: "test"
