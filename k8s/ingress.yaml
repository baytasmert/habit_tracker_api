apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: habit-tracker-api-ingress
  namespace: default
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /$2
spec:
  ingressClassName: nginx
  rules:
  - host: localhost
    http:
      paths:
      - path: /api(/|$)(.*)
        pathType: ImplementationSpecific
        backend:
          service:
            name: habit-tracker-api-service
            port:
              number: 8000  # API backend (Service port 8001 -> Pod port 8000)

---

# ArgoCD default namespace'den erişilebilsin diye ExternalName köprüsü
apiVersion: v1
kind: Service
metadata:
  name: argocd-server-ext
  namespace: default
spec:
  type: ExternalName
  externalName: argocd-server.argocd.svc.cluster.local
  ports:
  - port: 80

---

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: habit-tracker-ui-ingress
  namespace: default
spec:
  ingressClassName: nginx
  rules:
  - host: localhost
    http:
      paths:
      - path: /grafana
        pathType: Prefix
        backend:
          service:
            name: grafana-service
            port:
              number: 3000
      - path: /jaeger
        pathType: Prefix
        backend:
          service:
            name: jaeger
            port:
              number: 16686
      - path: /argocd
        pathType: Prefix
        backend:
          service:
            name: argocd-server-ext
            port:
              number: 80
      - path: /prometheus
        pathType: Prefix
        backend:
          service:
            name: prometheus-service
            port:
              number: 9090
