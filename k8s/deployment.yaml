apiVersion: v1
kind: Service
metadata:
  name: habit-tracker-api-service
spec:
  type: LoadBalancer
  ports:
    - port: 8001
      targetPort: 8000
      protocol: TCP
  selector:
    app: habit-tracker-api

---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: habit-tracker-api
  labels:
    app: habit-tracker-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: habit-tracker-api
  template:
    metadata:
      labels:
        app: habit-tracker-api
    spec:
      containers:
      - name: habit-tracker
        image: ghcr.io/kulo/habit_tracker_api-1:latest
        ports:
        - containerPort: 8000
        env:
        - name: DATABASE_URL
          value: "postgresql://user:password@postgres-service:5432/habits"
        - name: AWS_ENDPOINT_URL
          value: "http://localstack-service:4566"
