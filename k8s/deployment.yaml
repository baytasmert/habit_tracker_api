apiVersion: v1
kind: Service
metadata:
  name: habit-tracker-api-service
spec:
  type: LoadBalancer
  ports:
    - port: 8001
      targetPort: 8000
      protocol: TCP
  selector:
    app: habit-tracker-api

---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: habit-tracker-api
  labels:
    app: habit-tracker-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: habit-tracker-api
  template:
    metadata:
      labels:
        app: habit-tracker-api
    spec:
      containers:
      - name: habit-tracker
        image: ghcr.io/kulo/habit-tracker-api-1:latest
        imagePullPolicy: IfNotPresent
        command: ["uvicorn", "src.main:app", "--host", "0.0.0.0", "--port", "8000"]
        ports:
        - containerPort: 8000
        env:
        - name: DATABASE_URL
          value: "postgresql://user:password@postgres-service:5432/habits"
        - name: AWS_ENDPOINT_URL
          value: "http://localstack-service:4566"
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 3
          failureThreshold: 3
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 20
          periodSeconds: 10
