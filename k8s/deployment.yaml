apiVersion: v1
kind: Service
metadata:
  name: habit-tracker-api-service
spec:
  type: LoadBalancer
  ports:
    - port: 8001
      targetPort: 8000
      protocol: TCP
  selector:
    app: habit-tracker-api

---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: habit-tracker-api
  labels:
    app: habit-tracker-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: habit-tracker-api
  template:
    metadata:
      labels:
        app: habit-tracker-api
    spec:
      containers:
      - name: habit-tracker
        image: ghcr.io/baytasmert/habit-tracker-api:latest
        imagePullPolicy: Always
        command: ["uvicorn", "src.main:app", "--host", "0.0.0.0", "--port", "8000"]
        ports:
        - containerPort: 8000
        envFrom:
        - configMapRef:
            name: habit-tracker-config
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 3
          failureThreshold: 3
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 20
          periodSeconds: 10
